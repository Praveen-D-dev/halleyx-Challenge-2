<div class="order-list-container">
  <div class="header-actions">
    <h2>Customer Orders</h2>
    <button class="btn btn-primary" (click)="openOrderForm()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      <span>Create Order</span>
    </button>
  </div>

  <div class="table-container" *ngIf="orders.length > 0">
    <div class="responsive-table">
      <table mat-table [dataSource]="orders">
        
        <ng-container matColumnDef="customerName">
          <th mat-header-cell *matHeaderCellDef> Customer </th>
          <td mat-cell *matCellDef="let element">
            <div class="customer-info">
              <span class="name">{{element.firstName}} {{element.lastName}}</span>
              <span class="email">{{element.email}}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> Email </th>
          <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>

        <ng-container matColumnDef="product">
          <th mat-header-cell *matHeaderCellDef> Product </th>
          <td mat-cell *matCellDef="let element"> {{element.product}} </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef> Qty </th>
          <td mat-cell *matCellDef="let element"> {{element.quantity}} </td>
        </ng-container>

        <ng-container matColumnDef="totalAmount">
          <th mat-header-cell *matHeaderCellDef> Total </th>
          <td mat-cell *matCellDef="let element"> 
            <span class="amount">{{element.totalAmount | currency}}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [ngClass]="element.status.toLowerCase().replace(' ', '-')">
              {{element.status}}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu" class="modern-menu">
              <button mat-menu-item (click)="openOrderForm(element)">
                <mat-icon>edit</mat-icon>
                <span>Edit Details</span>
              </button>
              <button mat-menu-item (click)="deleteOrder(element._id)" class="text-danger">
                <mat-icon color="warn">delete</mat-icon>
                <span>Delete Order</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </div>
  
  <div *ngIf="orders.length === 0" class="no-data">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--border-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 24px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
    <p>No customer orders found. Start by creating your first order!</p>
    <button class="btn btn-primary" (click)="openOrderForm()">Create New Order</button>
  </div>
</div>
